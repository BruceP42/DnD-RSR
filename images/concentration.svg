<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <circle cx="50" cy="50" r="50" fill="#8b2f2f"/>
  <!-- Outer ring — 8 radiating lines (all cardinal + diagonal directions) -->
  <line x1="50" y1="10" x2="50" y2="18"  stroke="#ffaaaa" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="82" x2="50" y2="90"  stroke="#ffaaaa" stroke-width="3" stroke-linecap="round"/>
  <line x1="10" y1="50" x2="18" y2="50"  stroke="#ffaaaa" stroke-width="3" stroke-linecap="round"/>
  <line x1="82" y1="50" x2="90" y2="50"  stroke="#ffaaaa" stroke-width="3" stroke-linecap="round"/>
  <line x1="21" y1="21" x2="27" y2="27"  stroke="#ffaaaa" stroke-width="2" stroke-linecap="round"/>
  <line x1="79" y1="21" x2="73" y2="27"  stroke="#ffaaaa" stroke-width="2" stroke-linecap="round"/>
  <line x1="21" y1="79" x2="27" y2="73"  stroke="#ffaaaa" stroke-width="2" stroke-linecap="round"/>
  <line x1="79" y1="79" x2="73" y2="73"  stroke="#ffaaaa" stroke-width="2" stroke-linecap="round"/>
  <!-- Inner ring — lash lines radiating from upper eye arc -->
  <line x1="29" y1="32" x2="33" y2="37"  stroke="#ffaaaa" stroke-width="2" stroke-linecap="round"/>
  <line x1="39" y1="25" x2="41" y2="31"  stroke="#ffaaaa" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="22" x2="50" y2="29"  stroke="#ffaaaa" stroke-width="2" stroke-linecap="round"/>
  <line x1="61" y1="25" x2="59" y2="31"  stroke="#ffaaaa" stroke-width="2" stroke-linecap="round"/>
  <line x1="71" y1="32" x2="67" y2="37"  stroke="#ffaaaa" stroke-width="2" stroke-linecap="round"/>
  <!-- Eye — almond shape, iris, pupil, highlight -->
  <path d="M20,50 Q30,33 50,33 Q70,33 80,50 Q70,67 50,67 Q30,67 20,50 Z"
        fill="#ffaaaa" opacity="0.88"/>
  <circle cx="50" cy="50" r="13" fill="#cc4444"/>
  <circle cx="50" cy="50" r="6"  fill="#4a0000"/>
  <circle cx="55" cy="45" r="4"  fill="#ffffff" opacity="0.75"/>
